name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and tag Docker image
        run: |
          docker build -t devpulse-server:${{ github.sha }} ./server
          docker tag devpulse-server:${{ github.sha }} devpulse-server:latest

